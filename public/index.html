
<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>AWEC | 24/7 Link Collector</title>
    <style>
        body { background:#0a0a0a; color:#0f0; font-family:monospace; text-align:center; padding:20px; }
        .box { background:#111; border:1px solid #333; padding:20px; margin:20px auto; max-width:600px; }
        textarea { width:100%; height:120px; background:#000; color:#fff; border:1px solid #333; }
        button { background:#0f0; color:#000; padding:10px 20px; border:none; font-weight:bold; cursor:pointer; }
        .stats { font-size:1.2em; }
    </style>
</head>
<body>
    <h1>🕷️ AWEC 24/7 Hyper Spider</h1>
    <div class="box">
        <h3>➕ Ավելացրեք հղումներ</h3>
        <p>Տեղադրեք ցանկացած տեքստ (URL-ներ, կոդ) և սեղմեք «Ստեղծել Issue»։<br>
        <small>Ավտոմատ կմշակվի առանց գրանցման։</small></p>
        <textarea id="inputData" placeholder="https://example.com, magnet:?..."></textarea>
        <button onclick="createIssue()">🚀 ՈՒՂԱՐԿԵԼ (Issue-ի միջոցով)</button>
    </div>

    <div class="box stats">
        <h3>📊 Հավաքած հղումներ</h3>
        <p>Ընդհանուր՝ <strong id="totalLinks">...</strong></p>
        <p>Չափը՝ <strong id="dbSize">...</strong></p>
        <p>Թարմացում՝ <strong id="lastUpdate">...</strong></p>
    </div>

    <script>
        const REPO = 'your-username/your-repo';  // ՓՈԽԵԼ
        function createIssue() {
            const text = document.getElementById('inputData').value;
            if (!text.trim()) return alert('Դատարկ է');
            const title = '🔗 Link submission ' + new Date().toISOString().slice(0,19);
            const body = encodeURIComponent(text);
            const url = `https://github.com/${REPO}/issues/new?title=${encodeURIComponent(title)}&body=${body}`;
            window.open(url, '_blank');
        }

        async function loadStats() {
            const url = `https://raw.githubusercontent.com/${REPO}/main/public/stats.json`;
            try {
                const resp = await fetch(url);
                const data = await resp.json();
                document.getElementById('totalLinks').textContent = data.total_links.toLocaleString();
                document.getElementById('dbSize').textContent = data.size_human;
                document.getElementById('lastUpdate').textContent = new Date(data.last_update).toLocaleString();
            } catch(e) {
                console.log('Stats not available');
            }
        }
        loadStats();
        setInterval(loadStats, 60000);
    </script>
</body>
</html>
