name: "Process Issue Links"

on:
  issues:
    types: [opened]

jobs:
  extract-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Extract and save links from issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python issue_handler.py
      - name: Close issue with thank you
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "✅ Շնորհակալություն։ Բոլոր հղումները ավելացված են AWEC բազայում։"
