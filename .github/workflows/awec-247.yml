name: "AWEC 24/7 Hyper Collect"

on:
  schedule:
    - cron: '0 */6 * * *'   # յուր. 6 ժամը մեկ (00,06,12,18 UTC)
  workflow_dispatch:

jobs:
  hyper-collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360      # 6 ժամ, որից հետո ավտոմատ կանգնում է
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp aiofiles beautifulsoup4 lxml internetarchive

      - name: Run 24/7 Collector
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: python collector_247.py

      - name: Commit updated DB and stats
        run: |
          git config user.name "AWEC-Bot"
          git config user.email "bot@awec.local"
          git add links.db public/stats.json TMPLinks/
          git diff --quiet && git diff --staged --quiet || (git commit -m "💾 DB & stats updated" && git push)

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
