name: AWEC Continuous Link Collector

on:
  schedule:
    - cron: '0 */6 * * *' # Ամեն 6 ժամը մեկ
  workflow_dispatch:      # Ձեռքով միացում

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3

      - name: Install Python Requirements
        run: |
          pip install --upgrade pip
          pip install aiohttp beautifulsoup4 lxml

      - name: Run AWEC Planetary Crawler
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          # Գործարկում ենք սահմանափակ ժամանակով, որպեսզի workflow-ն չփակվի սխալով
          # Սկրիպտը կաշխատի 5.5 ժամ, որից հետո workflow-ն կպահպանի բազան ու կվերագործարկվի
          timeout 19800 python collector_247.py || true

      - name: Commit and Push DB Updates
        run: |
          git config --global user.name "AWEC Planetary Bot"
          git config --global user.email "bot@awec.internal"
          git add links.db logs/crawler.log
          git diff-index --quiet HEAD || git commit -m "chore: backup state and sync links.db [skip ci]"
          git push origin main

      - name: Trigger Next Run (24/7 Loop)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/crawler.yml/dispatches \
            -d '{"ref":"main"}'
