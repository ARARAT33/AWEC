name: AWEC Continuous Link Collector

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */5 * * *' # Ամեն 5 ժամը մեկ
  workflow_dispatch:      # Ձեռքով թողարկելու հնարավորություն

concurrency:
  group: aw_crawler_group
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 jq curl

      - name: Install Python Requirements
        run: |
          pip install --upgrade pip
          pip install aiohttp internetarchive

      - name: Download Last DB from GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 Փնտրում ենք վերջին տվյալների բազան..."
          RELEASE_DATA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/latest-state || true)
          
          DOWNLOAD_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name=="links.db") | .url' 2>/dev/null || echo "")
          
          if [ -n "$DOWNLOAD_URL" ] && [ "$DOWNLOAD_URL" != "null" ]; then
            echo "📥 Գտնվեց նախորդ աշխատանքային բազան։ Ներբեռնում ենք..."
            curl -L -H "Authorization: token $GITHUB_TOKEN" \
                 -H "Accept: application/octet-stream" \
                 -o links.db "$DOWNLOAD_URL"
            echo "✅ Բազան հաջողությամբ ներբեռնված է։"
          else
            echo "ℹ️ Նախորդ բազա չգտնվեց։ Ստեղծվում է նոր links.db..."
          fi

      - name: Run AWEC Planetary Crawler
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          echo "🚀 Սկսում ենք սարդի աշխատանքը 5 ժամով..."
          # Ճիշտ 5 ժամ (18000 վայրկյան) աշխատանք
          timeout 18000 python collector_247.py || true

      - name: Check and Repair SQLite Database
        if: always() # Միշտ աշխատել՝ նույնիսկ Cancel-ի դեպքում
        run: |
          if [ -f "links.db" ]; then
            echo "🛠️ Ստուգում ենք բազայի ամբողջականությունը..."
            INTEGRITY=$(sqlite3 links.db "PRAGMA integrity_check;" 2>&1 || echo "error")
            
            if [ "$INTEGRITY" != "ok" ] || [[ "$INTEGRITY" == *"error"* ]] || [[ "$INTEGRITY" == *"malformed"* ]]; then
              echo "⚠️ Բազան վնասված է (malformed): Սկսում ենք ավտոմատ վերականգնումը..."
              mv links.db links_corrupted.db
              # Վերականգնում ենք տվյալները նոր ֆայլի մեջ `.recover` հրամանով
              sqlite3 links_corrupted.db ".recover" | sqlite3 links.db
              
              # Եթե վերականգնումը հաջողվեց, ջնջում ենք վնասվածը
              if [ -f "links.db" ] && [ $(stat -c%s "links.db") -gt 0 ]; then
                echo "🎉 Բազան հաջողությամբ վերականգնվեց։"
                rm -f links_corrupted.db
              else
                echo "🚨 Վերականգնումը ձախողվեց։ Օգտագործում ենք նախորդ պահուստային տարբերակը..."
                mv links_corrupted.db links.db
              fi
            else
              echo "✅ Բազան առողջ է, վնասվածքներ չկան։"
            fi
          else
            echo "ℹ️ links.db ֆայլ գոյություն չունի։"
          fi

      - name: Export DB to Plain Text
        if: always()
        run: |
          python -c "
          import sqlite3
          import os
          if os.path.exists('links.db'):
              try:
                  conn = sqlite3.connect('links.db')
                  cursor = conn.cursor()
                  # Ստուգում ենք սեղանի գոյությունը, որպեսզի կոդը չկանգնի
                  cursor.execute(\"SELECT name FROM sqlite_master WHERE type='table' AND name='urls'\")
                  if cursor.fetchone():
                      cursor.execute('SELECT url FROM urls')
                      urls = cursor.fetchall()
                      with open('links.txt', 'w', encoding='utf-8') as f:
                          for u in urls:
                              f.write(u[0] + '\n')
                      print(f'🎉 Successfully exported {len(urls)} links to links.txt')
                  else:
                      print('Table urls does not exist yet!')
                  conn.close()
              except Exception as e:
                  print('Export failed:', e)
          else:
              print('links.db not found for export!')
          "

      - name: Analyze DB State and Prepare File Names
        if: always()
        id: prep
        run: |
          if [ -f "links.db" ]; then
            # Օգտագործում ենք -cmd կառուցվածքը սխալներից խուսափելու համար
            COUNT=$(sqlite3 links.db "SELECT COUNT(*) FROM urls" 2>/dev/null || echo "0")
            FILE_SIZE=$(stat -c%s "links.db" 2>/dev/null || echo "0")
          else
            COUNT=0
            FILE_SIZE=0
          fi
          
          LIMIT_2GB=2147483648
          if [ $FILE_SIZE -ge $LIMIT_2GB ]; then
            echo "🚨 FILE REACHED 2GB LIMIT!"
            TAG_NAME="v-chunk-$(date -d '+4 hours' +'%Y%m%d_%H%M%S')"
          else
            TAG_NAME="latest-state"
          fi
          
          TIMESTAMP=$(date -d '+4 hours' +'%Y%m%d_%H%M%S')
          echo "COUNT=$COUNT" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          
          if [ -f "links.db" ] && [ "$COUNT" -ne "0" ]; then
            cp links.db "${TIMESTAMP}_links_${COUNT}.db"
            echo "ARCHIVE_FILENAME=${TIMESTAMP}_links_${COUNT}.db" >> $GITHUB_OUTPUT
          else
            echo "ARCHIVE_FILENAME=" >> $GITHUB_OUTPUT
          fi

      - name: Handle GitHub Release and Upload Assets
        if: always() && steps.prep.outputs.COUNT != '0' && steps.prep.outputs.COUNT != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.prep.outputs.TAG_NAME }}
        run: |
          echo "📁 Ֆայլերի չափսերը ստուգում:"
          ls -lh links.db links.txt || true
          
          echo "🔄 Ստեղծում/թարմացնում ենք GitHub Release-ը..."
          RELEASE_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG | jq -r '.id')
          
          if [ "$RELEASE_ID" == "null" ] || [ -z "$RELEASE_ID" ]; then
            RELEASE_ID=$(curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"AWEC State $TAG\",\"body\":\"Links count: ${{ steps.prep.outputs.COUNT }}\"}" \
              https://api.github.com/repos/${{ github.repository }}/releases | jq -r '.id')
          fi
          
          ASSETS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets)
          for asset_id in $(echo "$ASSETS" | jq -r '.[] | .id'); do
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/${{ github.repository }}/releases/assets/$asset_id
          done
          
          echo "⬆️ Uploading links.db to GitHub Releases:"
          curl -# -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @links.db \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=links.db"
          
          echo -e "\n⬆️ Uploading links.txt to GitHub Releases:"
          curl -# -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: text/plain" \
            --data-binary @links.txt \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=links.txt"

      - name: Upload Snapshot to Internet Archive
        if: always() && steps.prep.outputs.COUNT != '0' && steps.prep.outputs.ARCHIVE_FILENAME != ''
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          FILENAME="${{ steps.prep.outputs.ARCHIVE_FILENAME }}"
          echo "📤 Sending snapshot to Archive.org: $FILENAME"
          mkdir -p ~/.config
          cat <<EOF > ~/.config/ia.ini
          [s3]
          access = $IA_ACCESS_KEY
          secret = $IA_SECRET_KEY
          EOF
          
          ia upload awec_links_awe_o.s "$FILENAME" \
            --metadata="title:AWEC Harvest $FILENAME" \
            --metadata="mediatype:data" \
            --metadata="collection:opensource"

      - name: Wait 30s and Trigger Next Loop Automatically
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "💤 Սպասում ենք 30 վայրկյան հանգստանալու համար..."
          sleep 30
          
          RUNS_COUNT=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/crawler.yml/runs?status=queued" \
            | jq '.total_count')
          
          if [ "$RUNS_COUNT" -eq 0 ] || [ -z "$RUNS_COUNT" ]; then
            echo "🔄 Հերթում սպասող աշխատանք չկա։ Կանչում ենք հաջորդ ցիկլը..."
            curl -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/crawler.yml/dispatches \
              -d '{"ref":"main"}'
          else
            echo "ℹ️ Հերթում արդեն կա սպասող աշխատանք։ Ավելորդ կանչ չենք անում։"
          fi