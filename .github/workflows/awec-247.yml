name: AWEC Continuous Link Collector

on:
  push:
    branches:
      - main              # Հենց կոդը push անես main branch, ավտոմատ կսկսի աշխատել
  schedule:
    - cron: '0 */6 * * *' # Ամեն 6 ժամը մեկ
  workflow_dispatch:      # Ձեռքով միացնելու հնարավորություն

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Requirements
        run: |
          pip install --upgrade pip
          pip install aiohttp internetarchive

      - name: Run AWEC Planetary Crawler
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          # Սարդը աշխատում է 5 ժամ (18000 վայրկյան), հետո ինքնուրույն անջատվում է
          timeout 18000 python collector_247.py || true

      - name: Export DB to Plain Text
        if: always()
        run: |
          python -c "
          import sqlite3
          import os
          if os.path.exists('links.db'):
              try:
                  conn = sqlite3.connect('links.db')
                  cursor = conn.cursor()
                  cursor.execute('SELECT url FROM urls')
                  urls = cursor.fetchall()
                  with open('links.txt', 'w', encoding='utf-8') as f:
                      for u in urls:
                          f.write(u[0] + '\n')
                  print(f'🎉 Successfully exported {len(urls)} links to links.txt')
                  conn.close()
              except Exception as e:
                  print('Export failed:', e)
          "

      - name: Upload to Internet Archive
        if: success()
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          # Հաշվում ենք հղումների քանակը
          COUNT=$(sqlite3 links.db "SELECT COUNT(*) FROM urls")
          # Սարքում ենք անունը՝ hour_dd_mm_yyyy_links_քանակ.db (Երևանի ժամանակով)
          FILENAME="$(date -d '+4 hours' +'%H_%d_%m_%Y')_links_${COUNT}.db"
          cp links.db "$FILENAME"
          
          # Վերբեռնում ենք Archive.org (առանց հին ֆայլերը ջնջելու)
          ia configure --access-key "$IA_ACCESS_KEY" --secret-key "$IA_SECRET_KEY"
          ia upload awec_links_awe_o.s "$FILENAME" \
            --metadata="title:AWEC Harvest $FILENAME" \
            --metadata="mediatype:data" \
            --metadata="collection:opensource"

      - name: Upload Links Text as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harvested-links-text
          path: links.txt

      - name: Commit and Push DB Updates
        if: success()
        run: |
          git config --global user.name "AWEC Planetary Bot"
          git config --global user.email "bot@awec.internal"
          git add links.db logs/crawler.log
          git diff-index --quiet HEAD || git commit -m "chore: backup state and sync links.db [skip ci]"
          git push origin main

      - name: Trigger Next Run (24/7 Loop)
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/crawler.yml/dispatches \
            -d '{"ref":"main"}'
