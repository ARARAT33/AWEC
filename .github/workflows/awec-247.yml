name: AWEC Continuous Link Collector

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

concurrency:
  group: awec_crawler_group
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  #  Job 1: Collector – 5 ժամ հավաքում, ապահով
  #  merge / split, artifact-ի մեջ shard-ներ
  # ──────────────────────────────────────────────
  collector:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      tag_name: ${{ steps.prep.outputs.TAG_NAME }}
      timestamp: ${{ steps.prep.outputs.TIMESTAMP }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 jq curl pv

      - name: Install Python requirements
        run: |
          python -m pip install --upgrade pip
          python -m pip install aiohttp internetarchive beautifulsoup4 requests

      # ── 1. Ներբեռնել նախորդ release-ի բոլոր .db մասերը ──
      - name: Download previous DB shards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📥 Փնտրում ենք նախորդ release-ը..."
          RELEASE_DATA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" || true)

          ASSETS=$(echo "$RELEASE_DATA" | jq -r '
            .assets[]? | select(.name | test("^links_part_\\d+\\.db$")) | 
            "\(.name) \(.url)"' 2>/dev/null || echo "")

          mkdir -p previous_shards
          if [ -n "$ASSETS" ]; then
            echo "$ASSETS" | sort -V | while IFS=' ' read -r NAME URL; do
              echo "⬇️ $NAME"
              curl -L -H "Authorization: token $GITHUB_TOKEN" \
                   -H "Accept: application/octet-stream" \
                   -o "previous_shards/$NAME" "$URL" --progress-bar
            done
            echo "✅ Ներբեռնված մասեր՝"
            ls -lh previous_shards/
          else
            echo "ℹ️ Նախորդ բազա չկա, սկսում ենք զրոյից"
          fi

      # ── 2. Ապահով միացնել բոլոր shard-ները մեկ links.db-ում ──
      - name: Safely merge previous shards into working DB
        run: |
          python3 << 'PYEOF'
          import sqlite3, os, shutil

          WORK_DB = "links.db"
          SHARD_DIR = "previous_shards"
          shards = sorted(
              [f for f in os.listdir(SHARD_DIR) if f.endswith(".db")],
              key=lambda x: int(x.split('_part_')[1].split('.')[0])
          )

          if not shards:
              # Ստեղծում ենք դատարկ բազա՝ նույն սխեմայով, որը կստեղծի collector_247.py-ն
              print("📭 Չկան նախորդ shard-ներ, կստեղծվի նորը crawler-ի կողմից")
              exit(0)

          # Վերցնում ենք առաջին shard-ի սխեման
          shutil.copyfile(os.path.join(SHARD_DIR, shards[0]), WORK_DB)
          main_conn = sqlite3.connect(WORK_DB)
          main_conn.execute("PRAGMA journal_mode=WAL")
          main_conn.execute("DELETE FROM urls")  # մաքրում ենք, եթե մեջը տվյալ կար

          for shard in shards:
              shard_path = os.path.join(SHARD_DIR, shard)
              main_conn.execute(f"ATTACH DATABASE '{shard_path}' AS shard")
              main_conn.execute("INSERT INTO main.urls SELECT * FROM shard.urls")
              main_conn.execute("DETACH DATABASE shard")
              print(f"➕ {shard} միացված")

          main_conn.commit()
          main_conn.close()
          print("🎉 Բոլոր shard-ները ապահով միացված են links.db-ում")
          PYEOF

      # ── 3. Ստուգել / բուժել աշխատանքային բազան ──
      - name: Check and repair SQLite database
        run: |
          if [ -f links.db ]; then
            echo "🛠️ Ստուգում..."
            INTEGRITY=$(sqlite3 links.db "PRAGMA integrity_check;" 2>&1 || echo "error")
            if [ "$INTEGRITY" != "ok" ] || [[ "$INTEGRITY" == *"error"* ]] || [[ "$INTEGRITY" == *"malformed"* ]]; then
              echo "⚠️ Բազան վնասված է, փորձում ենք բուժել..."
              OLD_ROWS=$(sqlite3 links.db "SELECT COUNT(*) FROM urls" 2>/dev/null || echo "0")
              mv links.db links_corrupted.db
              sqlite3 links_corrupted.db ".recover" | sqlite3 links.db
              if [ -f links.db ]; then
                NEW_ROWS=$(sqlite3 links.db "SELECT COUNT(*) FROM urls" 2>/dev/null || echo "0")
                RECOVERY_RATE=$(( OLD_ROWS > 0 ? (NEW_ROWS * 100 / OLD_ROWS) : 100 ))
                echo "🎉 Վերականգնվել է ~$RECOVERY_RATE% ($NEW_ROWS/$OLD_ROWS)"
                rm -f links_corrupted.db
              else
                echo "🚨 Բուժումը ձախողվեց, կշարունակենք դատարկ բազայով"
                rm -f links_corrupted.db
              fi
            else
              echo "✅ Բազան 100% առողջ է"
            fi
          fi

      # ── 4. Crawler – 5 ժամ ──
      - name: Run AWEC Planetary Crawler (5 hours)
        run: |
          echo "🚀 Crawler-ը միանում է..."
          python collector_247.py &
          SPIDER_PID=$!
          echo "PID=$SPIDER_PID"
          sleep 18000
          echo "⏰ 5 ժամը լրացավ, կանգնեցնում ենք..."
          kill -2 $SPIDER_PID
          wait $SPIDER_PID || true
          echo "✅ Crawler-ը կանգնեցվեց"

      # ── 5. Export links.txt ──
      - name: Export links to plain text
        if: always()
        run: |
          cat << 'EOF' > export_links.py
          import sqlite3, os
          if os.path.exists('links.db'):
              try:
                  conn = sqlite3.connect('links.db')
                  c = conn.cursor()
                  c.execute("SELECT name FROM sqlite_master WHERE type='table' AND name='urls'")
                  if c.fetchone():
                      c.execute('SELECT url FROM urls')
                      with open('links.txt', 'w', encoding='utf-8') as f:
                          for row in c:
                              f.write(row[0] + '\n')
                      print(f'🎉 Export {c.rowcount} links')
                  conn.close()
              except Exception as e:
                  print(f'Export failed: {e}')
          else:
              print('links.db not found')
          EOF
          python export_links.py

      # ── 6. Ապահով բաժանել links.db-ն <2GB shard-ների ──
      - name: Safely split database into shards (<2GB each)
        run: |
          python3 << 'PYEOF'
          import sqlite3, os

          SRC_DB = "links.db"
          MAX_SIZE = 1_900_000_000  # 1.9 GB
          SHARD_DIR = "shards"
          os.makedirs(SHARD_DIR, exist_ok=True)

          if not os.path.exists(SRC_DB):
              print("⚠️ links.db չկա, split-ի կարիք չկա")
              exit(0)

          src_conn = sqlite3.connect(SRC_DB)
          src_conn.execute("PRAGMA journal_mode=WAL")
          src_c = src_conn.cursor()

          # Ստանում ենք սխեման
          src_c.execute("SELECT sql FROM sqlite_master WHERE type='table' AND name='urls'")
          schema = src_c.fetchone()[0]
          src_c.execute("SELECT COUNT(*) FROM urls")
          total_rows = src_c.fetchone()[0]
          print(f"📊 Ընդհանուր {total_rows} տող")

          BATCH_SIZE = 100_000
          offset = 0
          shard_idx = 1

          while offset < total_rows:
              shard_name = os.path.join(SHARD_DIR, f"links_part_{shard_idx:04d}.db")
              if os.path.exists(shard_name):
                  os.remove(shard_name)
              shard_conn = sqlite3.connect(shard_name)
              shard_conn.execute(schema)
              shard_conn.execute("DELETE FROM urls")
              shard_conn.commit()

              rows_copied = 0
              while offset < total_rows:
                  # Միանգամից մեծ batch
                  end = min(offset + BATCH_SIZE, total_rows)
                  src_c.execute(
                      f"SELECT * FROM urls LIMIT {end - offset} OFFSET {offset}"
                  )
                  batch = src_c.fetchall()
                  if not batch:
                      break
                  shard_conn.executemany("INSERT INTO urls VALUES (?)", 
                                         [(row[0],) for row in batch])
                  rows_copied += len(batch)
                  offset = end
                  # Չափել ֆայլը
                  if os.path.getsize(shard_name) >= MAX_SIZE:
                      break

              shard_conn.commit()
              shard_conn.close()
              print(f"✅ {shard_name} – {rows_copied} rows, size {os.path.getsize(shard_name)}")
              shard_idx += 1

          src_conn.close()
          print("🎉 Split ավարտված")
          PYEOF

      # ── 7. Արխիվացնել shard-ները + links.txt artifact-ի մեջ ──
      - name: Package shards and links.txt
        run: |
          tar -czf collector-output.tar.gz shards links.txt

      - name: Upload collector artifact
        uses: actions/upload-artifact@v4
        with:
          name: collector-output
          path: collector-output.tar.gz
          retention-days: 1

      # ── 8. Ելքային փոփոխականներ ──
      - name: Prepare tag & timestamp
        id: prep
        if: always()
        run: |
          # Հաշվում ենք ընդհանուր հղումները (մի քանի shard-ից)
          TOTAL=0
          for db in shards/links_part_*.db; do
            if [ -f "$db" ]; then
              CNT=$(sqlite3 "$db" "SELECT COUNT(*) FROM urls" 2>/dev/null || echo 0)
              TOTAL=$((TOTAL + CNT))
            fi
          done
          TIMESTAMP=$(date -d '+4 hours' +'%Y%m%d_%H%M%S')
          TAG_NAME="v-${TIMESTAMP}"
          echo "COUNT=$TOTAL" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────
  #  Job 2: GitHub Release Uploader
  # ──────────────────────────────────────────────
  github-release-upload:
    needs: collector
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      TAG: ${{ needs.collector.outputs.tag_name }}
    steps:
      - name: Download collector artifact
        uses: actions/download-artifact@v4
        with:
          name: collector-output

      - name: Extract artifact
        run: tar -xzf collector-output.tar.gz

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Create GitHub Release
        run: |
          # Հաշվում ենք ընդհանուր հղումները
          TOTAL=0
          for db in shards/links_part_*.db; do
            [ -f "$db" ] && TOTAL=$(( TOTAL + $(sqlite3 "$db" "SELECT COUNT(*) FROM urls" 2>/dev/null || echo 0) ))
          done
          gh release create "$TAG" \
            --title "AWEC Run $TAG" \
            --notes "Successfully collected ${TOTAL} links." \
            --target main || echo "⚠️ Release might already exist"

      - name: Upload all shards + links.txt to release
        run: |
          cd shards
          for file in links_part_*.db; do
            [ -f "$file" ] && gh release upload "$TAG" "$file" --clobber
          done
          if [ -f ../links.txt ]; then
            gh release upload "$TAG" ../links.txt --clobber
          fi

  # ──────────────────────────────────────────────
  #  Job 3: Internet Archive Uploader
  # ──────────────────────────────────────────────
  internet-archive-upload:
    needs: collector
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
      IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
    steps:
      - name: Download collector artifact
        uses: actions/download-artifact@v4
        with:
          name: collector-output

      - name: Extract artifact
        run: tar -xzf collector-output.tar.gz

      - name: Upload to Internet Archive
        run: |
          mkdir -p ~/.config
          cat << EOF > ~/.config/ia.ini
          [s3]
          access = $IA_ACCESS_KEY
          secret = $IA_SECRET_KEY
          EOF

          IDENTIFIER="awec_links_${{ needs.collector.outputs.timestamp }}"
          echo "📤 Uploading to IA as $IDENTIFIER"

          # Վերբեռնում ենք բոլոր shard-ները + links.txt
          for file in shards/links_part_*.db; do
            [ -f "$file" ] && ia upload "$IDENTIFIER" "$file" --retries 5
          done
          [ -f links.txt ] && ia upload "$IDENTIFIER" links.txt --retries 5

          echo "✅ IA upload ավարտված"