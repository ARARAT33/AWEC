name: AWEC Continuous Link Collector

on:
  push:
    branches:
      - main              # Հենց կոդը push անես, միանգամից ավտոմատ կսկսի աշխատել
  schedule:
    - cron: '0 */6 * * *' # Ամեն 6 ժամը մեկ
  workflow_dispatch:      # Ձեռքով միացնելու հնարավորություն

permissions:
  contents: write         # Թույլտվություն՝ Release ստեղծելու և թարմացնելու համար

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 jq curl

      - name: Install Python Requirements
        run: |
          pip install --upgrade pip
          pip install aiohttp internetarchive

      - name: Download Last DB from GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 Փնտրում ենք վերջին տվյալների բազան..."
          # Գտնում ենք 'latest-state' թագով հիմնական աշխատանքային Release-ը
          RELEASE_DATA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/latest-state || true)
          
          DOWNLOAD_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name=="links.db") | .url' 2>/dev/null || echo "")
          
          if [ -n "$DOWNLOAD_URL" ] && [ "$DOWNLOAD_URL" != "null" ]; then
            echo "📥 Գտնվեց նախորդ աշխատանքային բազան։ Ներբեռնում ենք..."
            curl -L -H "Authorization: token $GITHUB_TOKEN" \
                 -H "Accept: application/octet-stream" \
                 -o links.db "$DOWNLOAD_URL"
            echo "✅ Բազան հաջողությամբ ներբեռնված է։"
          else
            echo "ℹ️ Նախորդ բազա չգտնվեց։ Ստեղծվում է նոր links.db..."
          fi

      - name: Run AWEC Planetary Crawler
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          # Սարդը աշխատում է 5 ժամ (18000 վայրկյան)
          timeout 18000 python collector_247.py || true

      - name: Export DB to Plain Text
        if: always() # Աշխատում է ՄԻՇՏ (նույնիսկ եթե ձեռքով Cancel ես արել)
        run: |
          python -c "
          import sqlite3
          import os
          if os.path.exists('links.db'):
              try:
                  conn = sqlite3.connect('links.db')
                  cursor = conn.cursor()
                  cursor.execute('SELECT url FROM urls')
                  urls = cursor.fetchall()
                  with open('links.txt', 'w', encoding='utf-8') as f:
                      for u in urls:
                          f.write(u[0] + '\n')
                  print(f'🎉 Successfully exported {len(urls)} links to links.txt')
                  conn.close()
              except Exception as e:
                  print('Export failed:', e)
          else:
              print('links.db not found for export!')
          "

      - name: Analyze DB State and Prepare File Names
        if: always()
        id: prep
        run: |
          if [ -f "links.db" ]; then
            COUNT=$(sqlite3 links.db "SELECT COUNT(*) FROM urls")
            FILE_SIZE=$(stat -c%s "links.db")
          else
            COUNT=0
            FILE_SIZE=0
          fi
          
          # 2GB սահմանափակման ստուգում (2,147,483,648 bytes)
          LIMIT_2GB=2147483648
          if [ $FILE_SIZE -ge $LIMIT_2GB ]; then
            echo "🚨 FILE REACHED 2GB LIMIT!"
            echo "REACHED_2GB=true" >> $GITHUB_OUTPUT
          else
            echo "REACHED_2GB=false" >> $GITHUB_OUTPUT
          fi
          
          TIMESTAMP=$(date -d '+4 hours' +'%Y%m%d_%H%M%S')
          echo "COUNT=$COUNT" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_OUTPUT
          
          if [ -f "links.db" ]; then
            cp links.db "${TIMESTAMP}_links_${COUNT}.db"
            echo "ARCHIVE_FILENAME=${TIMESTAMP}_links_${COUNT}.db" >> $GITHUB_OUTPUT
          fi

      - name: Update Main GitHub Release (Continuous State)
        if: always() && steps.prep.outputs.COUNT != '0' && steps.prep.outputs.REACHED_2GB == 'false'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: latest-state
          name: "AWEC - Active Continuous State"
          body: |
            ### 📊 AWEC Live Current State
            - **Վերջին թարմացում:** ${{ steps.prep.outputs.TIMESTAMP }} (Yerevan Time)
            - **Հղումների ընթացիկ քանակ:** `${{ steps.prep.outputs.COUNT }}`
            - *Այս Release-ը ավտոմատ overwrite է լինում ամեն ցիկլի վերջում, քանի դեռ բազան < 2GB է։*
          draft: false
          prerelease: false
          files: |
            links.db
            links.txt

      - name: Create New Chunk Release (If 2GB Reached)
        if: always() && steps.prep.outputs.COUNT != '0' && steps.prep.outputs.REACHED_2GB == 'true'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "v-chunk-${{ steps.prep.outputs.TIMESTAMP }}"
          name: "AWEC Backup [2GB CHUNK] - v${{ steps.prep.outputs.TIMESTAMP }}"
          body: |
            ### ⚠️ 2GB Limit Reached - New Chunk Saved
            - **Հղումների քանակ:** `${{ steps.prep.outputs.COUNT }}`
            - **Ամսաթիվ:** ${{ steps.prep.outputs.TIMESTAMP }}
          draft: false
          prerelease: false
          files: |
            links.db
            links.txt

      - name: Upload Snapshot to Internet Archive
        if: always() && steps.prep.outputs.COUNT != '0'
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          FILENAME="${{ steps.prep.outputs.ARCHIVE_FILENAME }}"
          echo "📤 Sending 5-hour snapshot to Archive.org: $FILENAME"
          ia configure --access-key "$IA_ACCESS_KEY" --secret-key "$IA_SECRET_KEY"
          ia upload awec_links_awe_o.s "$FILENAME" \
            --metadata="title:AWEC Harvest $FILENAME" \
            --metadata="mediatype:data" \
            --metadata="collection:opensource"

      - name: Trigger Next Loop Automatically
        if: always() # Միշտ կաշխատի՝ նույնիսկ ձեռքով Cancel անելուց հետո
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 Կանչում ենք հաջորդ ցիկլը..."
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/crawler.yml/dispatches \
            -d '{"ref":"main"}'