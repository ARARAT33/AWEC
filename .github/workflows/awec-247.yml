name: AWEC Continuous Link Collector

on:
  push:
    branches:
      - main              # Հենց կոդը push անես main branch, ավտոմատ կսկսի աշխատել
  schedule:
    - cron: '0 */6 * * *' # Ամեն 6 ժամը մեկ
  workflow_dispatch:      # Ձեռքով միացնելու հնարավորություն

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Requirements
        run: |
          pip install --upgrade pip
          pip install aiohttp

      - name: Run AWEC Planetary Crawler
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
        run: |
          # Սարդը աշխատում է 5 ժամ (18000 վայրկյան), հետո ինքնուրույն անջատվում է
          timeout 18000 python collector_247.py || true

      - name: Export DB to Plain Text
        # 'always()' երաշխավորում է, որ քայլը կաշխատի նույնիսկ ձեռքով Cancel անելու դեպքում
        if: always()
        run: |
          python -c "
          import sqlite3
          import os
          if os.path.exists('links.db'):
              try:
                  conn = sqlite3.connect('links.db')
                  cursor = conn.cursor()
                  cursor.execute('SELECT url FROM urls')
                  urls = cursor.fetchall()
                  with open('links.txt', 'w', encoding='utf-8') as f:
                      for u in urls:
                          f.write(u[0] + '\n')
                  print(f'🎉 Successfully exported {len(urls)} links to links.txt')
                  conn.close()
              except Exception as e:
                  print('Export failed:', e)
          else:
              print('links.db not found, creating empty links.txt')
              with open('links.txt', 'w') as f:
                  f.write('')
          "

      - name: Upload Links Text as Artifact
        # Սա նույնպես կաշխատի միշտ (նույնիսկ Cancel-ից հետո) ու կտա քեզ ZIP ֆայլը
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harvested-links-text
          path: links.txt

      - name: Commit and Push DB Updates
        # Բազայի վերջնական պահպանումը GitHub-ում (միայն եթե աշխատանքը բնական է ավարտվել)
        if: success()
        run: |
          git config --global user.name "AWEC Planetary Bot"
          git config --global user.email "bot@awec.internal"
          git add links.db logs/crawler.log
          git diff-index --quiet HEAD || git commit -m "chore: backup state and sync links.db [skip ci]"
          git push origin main

      - name: Trigger Next Run (24/7 Loop)
        # Հաջորդ ցիկլի ավտոմատ միացումը (միայն եթե նախորդը հաջողությամբ ավարտվել է)
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/crawler.yml/dispatches \
            -d '{"ref":"main"}'
