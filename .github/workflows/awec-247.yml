name: AWEC Planetary Crawler 24/7

on:
  workflow_dispatch: # Ձեռքով միացնելու համար
  repository_dispatch:
    types: [trigger_crawler] # Ինքնագործարկման ազդակը

permissions: write-all

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Հեռացրել ենք cache-ը, որպեսզի requirements.txt չփնտրի ու սխալ չտա

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 lxml aiohttp internetarchive

      - name: Run Crawler (Max 5 Hours)
        run: |
          # Օպտիմալացնում ենք զուգահեռ աշխատողներին Actions-ի թույլ սերվերի համար
          # Գործարկում ենք քո տրամադրած ֆայլը
          python -c "
          with open('collector_247.py', 'r') as f:
              code = f.read()
          code = code.replace('max_workers: int = 2000', 'max_workers: int = 150')
          with open('collector_247_2.py', 'w') as f:
              f.write(code)
          "
          python collector_247_2.py
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}

      - name: Commit and Push Database Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add links.db logs/ || true
          
          if git diff --staged --quiet; then
            echo "Բազայում նոր փոփոխություններ չկան:"
          else
            git commit -m "Auto-save database state (Cycle End) [skip ci]"
            git push
          fi

      - name: Wait 30 Seconds & Trigger Next Run
        run: |
          echo "Սպասում ենք 30 վայրկյան՝ RAM-ը թարմացնելու և հաջորդ ցիկլը սկսելու համար..."
          sleep 30
          
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "trigger_crawler"}'
